<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Hero Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* Hero Section */
.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:60px 10%;
    background:#f5f7fa;
}

/* Left Content */
.hero-text{
    max-width:500px;
}

.hero-text h1{
    font-size:42px;
    color:#333;
    margin-bottom:20px;
}

.hero-text p{
    font-size:18px;
    color:#555;
    margin-bottom:25px;
}

.hero-text button{
    padding:12px 25px;
    border:none;
    background:#007bff;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

.hero-text button:hover{
    background:#0056b3;
}

/* Image */
.hero-image img{
    width:450px;
    max-width:100%;
}

/* Mobile Responsive */
@media (max-width:768px){

.hero{
    flex-direction:column;
    text-align:center;
}

.hero-text h1{
    font-size:32px;
}

.hero-image{
    margin-top:30px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="hero-text">
<h1>Learn Coding Easily</h1>
<p>Start your journey in programming with simple and practical lessons designed for beginners.</p>
<button>Get Started</button>
</div>

<div class="hero-image">
<img src="https://cdn-icons-png.flaticon.com/512/2721/2721261.png" alt="coding image">
</div>

</section>

</body>
</html>
