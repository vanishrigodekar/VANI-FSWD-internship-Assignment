<!DOCTYPE html>
<html>
<head>
<title>Simple Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator{
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    text-align: center;
}

h2{
    margin-bottom: 15px;
}

input{
    width: 200px;
    padding: 8px;
    margin: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button{
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover{
    background: #45a049;
}

#result{
    margin-top: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="calculator">
<h2>Simple Calculator</h2>

<input type="number" id="num1" placeholder="Enter first number"><br>
<input type="number" id="num2" placeholder="Enter second number"><br>

<button onclick="add()">+</button>
<button onclick="subtract()">-</button>
<button onclick="multiply()">*</button>
<button onclick="divide()">/</button>

<p id="result"></p>
</div>

<script>

function add(){
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    document.getElementById("result").innerHTML = "Result: " + (a + b);
}

function subtract(){
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    document.getElementById("result").innerHTML = "Result: " + (a - b);
}

function multiply(){
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    document.getElementById("result").innerHTML = "Result: " + (a * b);
}

function divide(){
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);

    if(b == 0){
        document.getElementById("result").innerHTML = "Cannot divide by zero";
    } else {
        document.getElementById("result").innerHTML = "Result: " + (a / b);
    }
}

</script>

</body>
</html>
